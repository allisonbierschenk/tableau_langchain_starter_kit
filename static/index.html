<!DOCTYPE html>
<html>
<head>
    <title>Tableau AI Chat</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <!-- Load Tableau Extensions API first (no-op when not in Tableau) -->
    <script src="static/tableau.extensions.1.latest.min.js"></script>
    <!-- Configuration: use same origin when deployed so extension talks to this app -->
    <script>
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            window.API_BASE_URL = 'http://localhost:8000';
        } else {
            window.API_BASE_URL = window.location.origin;
        }
    </script>
    <script src="static/script.js" defer></script>
</head>
<body>
    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container-visible">
        <div class="container">
            <header>
                <h1>Conversational Analytics</h1>
                <p id="viewerIdentityBar" class="viewer-identity-bar" aria-live="polite">
                    <span class="viewer-identity-row">
                        <span id="viewerIdentityLabel" class="viewer-identity-label">Dynamic User</span>
                        <span id="viewerIdentityValue" class="viewer-identity-value">—</span>
                    </span>
                    <span id="viewerIdentitySub" class="viewer-identity-sub" hidden></span>
                </p>
            </header>

            <div class="chat-box" id="chatBox">
                <div class="message bot">
                    Hello! Ask me anything about your Tableau data.
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your question here..." autocomplete="off">
                <button type="button" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
